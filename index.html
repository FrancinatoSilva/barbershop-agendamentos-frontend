<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <h2>Agendamento</h2>
    <form id="form-agendamento">
    
        <div>
            <label for="nome">Nome Completo:</label>
            <input 
                type="text"
                id="nome"
                name="nome"
                placeholder="Digite seu nome"
                required>
        </div>

        <br>

        <div>
            <label for="telefone">Telefone:</label>
            <input 
                type="tel"
                id="telefone"
                name="telefone"
                placeholder="(85) 99999-9999"
                required>
        </div>

        <br>

        <div>
            <label for="email">E-mail:</label>
            <input 
                type="email"
                id = "email"
                name="email"
                placeholder="seuemail@email.com">
        </div>

        <br>

        <div>
            <label for="servico">Serviço:</label>

            <select name="servico" id="servico">
                <option value="corte">Corte de Cabelo</option>
                <option value="barba">Barba</option>
                <option value="sobrancelha">Sobrancelha</option>

                <option value="corte_barba">Corte + Barba</option>
                <option value="corte_sobrancelha">Corte + Sobrancelha</option>
                <option value="corte_barba_sobrancelha">Corte + Barba + Sobrancelha</option>
            </select>
        </div>

        <br>
        
        <div>
            <label for="agendamento">Data e Hora:</label>
            <input 
                type="datetime-local"
                id="agendamento"
                name="agendamento"
                required>
        </div>

        <br><br>

        <button type="submit">
        Agendar
        </button>

    </form>

    <script src="assets/js/script.js"></script>

</body>
</html>
